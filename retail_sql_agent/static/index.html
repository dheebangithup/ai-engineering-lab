<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Analyst Agent | Flow Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>📊 Retail SQL <span>Agent</span></h1>
        <div class="actions">
            <div id="status-badge"
                style="font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.4rem;">
                <span style="width: 8px; height: 8px; background: #238636; border-radius: 50%;"></span>
                Connected
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar for History -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <span>+</span> New Chat
                </button>
            </div>
            <div
                style="padding: 1rem 1.5rem 0.5rem; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">
                Recent Conversations
            </div>
            <div id="history-list" class="history-list">
                <!-- History items injected here -->
            </div>
        </aside>

        <!-- Chat Area -->
        <section class="chat-section">
            <div id="chat-history">
                <div class="message assistant-message">Hello! I'm your SQL analyst. Ask me anything about your sales
                    data.</div>
            </div>

            <div class="input-area">
                <form id="chat-form" class="input-container">
                    <input type="text" id="user-input" placeholder="e.g., Show me the top 5 products by revenue"
                        required autocomplete="off">
                    <button type="submit" id="send-btn">Ask Claude</button>
                </form>
            </div>
        </section>

        <!-- Process Flow Visualization -->
        <section class="flow-section">
            <div class="flow-header" style="justify-content: space-between;">
                <div><span class="icon">⚡</span> Agent Process Flow</div>
                <div id="active-skills"
                    style="display: flex; gap: 0.5rem; align-items: center; justify-content: flex-end; flex-wrap: wrap;">
                    <!-- Skill badges injected here -->
                </div>
            </div>
            <div id="flow-container">
                <!-- Flow steps will appear here -->
                <div style="color: var(--text-secondary); text-align: center; margin-top: 2rem;">
                    Flow visualization will appear once you ask a question.
                </div>
            </div>
        </section>
    </div>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const flowContainer = document.getElementById('flow-container');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const historyList = document.getElementById('history-list');

        let currentAssistantMsgElement = null;
        let currentSessionId = null;

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.textContent = text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return div;
        }

        function addFlowStep(type, content, extra = null) {
            const div = document.createElement('div');
            div.className = 'flow-step';

            const typeLabel = document.createElement('span');
            typeLabel.className = `step-type type-${type.toLowerCase()}`;
            typeLabel.textContent = type;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'step-content';
            contentDiv.textContent = content;

            div.appendChild(typeLabel);
            div.appendChild(contentDiv);

            if (extra) {
                if (type === 'SQL') {
                    const pre = document.createElement('pre');
                    pre.textContent = extra;
                    div.appendChild(pre);
                } else {
                    const pre = document.createElement('pre');
                    pre.style.color = 'var(--text-secondary)';
                    pre.textContent = JSON.stringify(extra, null, 2);
                    div.appendChild(pre);
                }
            }

            flowContainer.appendChild(div);
            flowContainer.scrollTop = flowContainer.scrollHeight;
        }

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const question = userInput.value.trim();
            if (!question) return;

            // Clear UI for new round
            addMessage(question, 'user');
            userInput.value = '';
            flowContainer.innerHTML = '';
            document.getElementById('active-skills').innerHTML = '';
            currentAssistantMsgElement = addMessage('', 'assistant');

            sendBtn.disabled = true;

            const url = `/stream?question=${encodeURIComponent(question)}${currentSessionId ? `&session_id=${currentSessionId}` : ''}`;
            const eventSource = new EventSource(url);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'session_id') {
                    currentSessionId = data.content;
                    loadSessions(); // Refresh sidebar to show the new/updated title
                }
                else if (data.type === 'text') {
                    currentAssistantMsgElement.textContent += data.content;
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }
                else if (data.type === 'active_skills') {
                    const skillsContainer = document.getElementById('active-skills');

                    // Only initialize the title if it's the first skill badge we are adding
                    if (skillsContainer.innerHTML.trim() === '') {
                        skillsContainer.innerHTML = '<span style="font-size: 0.75rem; color: var(--text-secondary);">Using Skills:</span>';
                    }

                    data.content.forEach(skill => {
                        // Avoid adding duplicate badges if Claude mentions it multiple times in a stream
                        const existingBadges = Array.from(skillsContainer.getElementsByClassName('skill-badge'));
                        if (!existingBadges.find(b => b.textContent === skill)) {
                            const badge = document.createElement('span');
                            badge.className = 'skill-badge';
                            badge.textContent = skill;
                            skillsContainer.appendChild(badge);
                        }
                    });
                }
                else if (data.type === 'tool_start') {
                    let type = 'TOOL';
                    let content = `Calling ${data.name}...`;
                    let extra = data.args;

                    if (data.name === 'execute_sql_query') {
                        type = 'SQL';
                        content = data.args.explanation || 'Executing query';
                        extra = data.args.query;
                    }

                    addFlowStep(type, content, extra);
                }
                else if (data.type === 'tool_result') {
                    // Find the last tool/sql step and append the result
                    const steps = flowContainer.querySelectorAll('.flow-step');
                    if (steps.length > 0) {
                        const lastStep = steps[steps.length - 1];
                        const resultTitle = document.createElement('div');
                        resultTitle.style.marginTop = '0.5rem';
                        resultTitle.style.fontSize = '0.75rem';
                        resultTitle.style.color = 'var(--accent-color)';
                        resultTitle.textContent = 'Result:';

                        const pre = document.createElement('pre');
                        pre.style.marginTop = '0.25rem';
                        pre.style.maxHeight = '200px';
                        pre.style.overflowY = 'auto';
                        pre.style.fontSize = '0.7rem';

                        // Try to parse JSON for prettier display
                        try {
                            const parsed = JSON.parse(data.result);
                            pre.textContent = JSON.stringify(parsed, null, 2);
                        } catch (e) {
                            pre.textContent = data.result;
                        }

                        lastStep.appendChild(resultTitle);
                        lastStep.appendChild(pre);
                        flowContainer.scrollTop = flowContainer.scrollHeight;
                    }
                }
                else if (data.type === 'error') {
                    addFlowStep('ERROR', data.content);
                    eventSource.close();
                    sendBtn.disabled = false;
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
                sendBtn.disabled = false;
            };

            // Heuristic to detect completion (SSE usually ends)
            // The backend StreamingResponse will close the connection when the generator finishes.
            // eventSource doesn't have a built-in 'complete' event, it just errors or we can send a custom event.
        };

        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                if (data.status === 'success') {
                    historyList.innerHTML = '';
                    data.sessions.forEach(session => {
                        const item = document.createElement('div');
                        item.className = `history-item ${session.id === currentSessionId ? 'active' : ''}`;
                        item.innerHTML = `<span style="margin-right: 0.5rem; opacity: 0.7;">💬</span> ${session.title}`;
                        item.onclick = () => loadSessionHistory(session.id);
                        historyList.appendChild(item);
                    });
                }
            } catch (e) {
                console.error('Failed to load sessions', e);
            }
        }

        async function loadSessionHistory(sessionId) {
            if (sessionId === currentSessionId) return;

            try {
                const res = await fetch(`/api/session/${sessionId}`);
                const data = await res.json();
                if (data.status === 'success') {
                    currentSessionId = sessionId;
                    chatHistory.innerHTML = '';
                    flowContainer.innerHTML = '';
                    document.getElementById('active-skills').innerHTML = '';

                    data.session.history.forEach(event => {
                        renderEvent(event);
                    });

                    loadSessions(); // Refresh active state
                }
            } catch (e) {
                console.error('Failed to load session history', e);
            }
        }

        function renderEvent(data) {
            if (data.type === 'user_question') {
                addMessage(data.content, 'user');
            }
            else if (data.type === 'text') {
                // Check if the previous message was assistant text to append
                const messages = chatHistory.querySelectorAll('.assistant-message');
                if (messages.length > 0 && data.append !== false) {
                    const lastMsg = messages[messages.length - 1];
                    lastMsg.textContent += data.content;
                } else {
                    addMessage(data.content, 'assistant');
                }
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
            else if (data.type === 'active_skills') {
                const skillsContainer = document.getElementById('active-skills');
                if (skillsContainer.innerHTML.trim() === '') {
                    skillsContainer.innerHTML = '<span style="font-size: 0.75rem; color: var(--text-secondary);">Using Skills:</span>';
                }
                data.content.forEach(skill => {
                    const existingBadges = Array.from(skillsContainer.getElementsByClassName('skill-badge'));
                    if (!existingBadges.find(b => b.textContent === skill)) {
                        const badge = document.createElement('span');
                        badge.className = 'skill-badge';
                        badge.textContent = skill;
                        skillsContainer.appendChild(badge);
                    }
                });
            }
            else if (data.type === 'tool_start') {
                let type = 'TOOL';
                let content = `Calling ${data.name}...`;
                let extra = data.args;
                if (data.name === 'execute_sql_query') {
                    type = 'SQL';
                    content = data.args.explanation || 'Executing query';
                    extra = data.args.query;
                }
                addFlowStep(type, content, extra);
            }
            else if (data.type === 'tool_result') {
                const steps = flowContainer.querySelectorAll('.flow-step');
                if (steps.length > 0) {
                    const lastStep = steps[steps.length - 1];
                    const resultTitle = document.createElement('div');
                    resultTitle.style.marginTop = '0.5rem';
                    resultTitle.style.fontSize = '0.75rem';
                    resultTitle.style.color = 'var(--accent-color)';
                    resultTitle.textContent = 'Result:';
                    const pre = document.createElement('pre');
                    pre.style.marginTop = '0.25rem';
                    pre.style.maxHeight = '200px';
                    pre.style.overflowY = 'auto';
                    pre.style.fontSize = '0.7rem';
                    try {
                        const parsed = JSON.parse(data.result);
                        pre.textContent = JSON.stringify(parsed, null, 2);
                    } catch (e) {
                        pre.textContent = data.result;
                    }
                    lastStep.appendChild(resultTitle);
                    lastStep.appendChild(pre);
                    flowContainer.scrollTop = flowContainer.scrollHeight;
                }
            }
        }

        newChatBtn.onclick = async () => {
            await fetch('/reset', { method: 'POST' });
            currentSessionId = null;
            chatHistory.innerHTML = '<div class="message assistant-message">New conversation started. How can I help?</div>';
            flowContainer.innerHTML = '';
            document.getElementById('active-skills').innerHTML = '';
            loadSessions();
        };

        // Initial load
        window.onload = () => {
            loadSessions();
        };
    </script>
</body>

</html>
